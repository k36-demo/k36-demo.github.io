<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Gaming Demo Showcase</title>
  <style>
    :root{
      --bg:#070709;
      --card:#131316;
      --muted:#8b8c90;
      --accent:#00f5e0;
      --glow:0 6px 20px rgba(0,245,224,0.08);
    }

    *{ box-sizing:border-box; }

    html,body{
      height:100%;
      margin:0;
      background:var(--bg);
      color:#eee;
      font-family:Inter,Segoe UI,Roboto,Arial,sans-serif;
    }

    .wrap{
      display:flex;
      min-height:100vh;
    }

    .sidebar{
      width:270px;
      background:#0b0b0d;
      padding:22px;
      border-right:1px solid rgba(255,255,255,0.03);
      position:fixed;
      top:0;
      bottom:0;
      overflow:auto;
    }

    .logo-title{
      color:var(--accent);
      font-weight:700;
      margin-bottom:14px;
      font-size:18px;
    }

    .search{
      margin-bottom:18px;
    }

    .search input{
      width:100%;
      padding:10px;
      border-radius:8px;
      border:0;
      outline:none;
      background:#0f1113;
      color:#fff;
      box-shadow:inset 0 1px 0 rgba(255,255,255,0.02);
    }

    .category{
      margin:8px 0;
      padding:8px;
      border-radius:8px;
      cursor:pointer;
      color:var(--muted);
      transition:all .15s ease;
    }

    .category:hover{
      background:#0e1113;
      color:#fff;
    }

    .category.active{
      background:linear-gradient(90deg,#06121a66,transparent);
      box-shadow:var(--glow);
      color:var(--accent);
      border-left:3px solid var(--accent);
      padding-left:12px;
    }

    .main{
      margin-left:270px;
      padding:28px;
      flex:1;
    }

    .tools{
      display:flex;
      gap:12px;
      align-items:center;
      margin-bottom:18px;
    }

    .button{
      background:linear-gradient(90deg,#0fffdc11,#00a2ff11);
      border:1px solid rgba(0,165,200,0.08);
      padding:8px 12px;
      border-radius:8px;
      color:var(--accent);
      cursor:pointer;
      box-shadow:0 6px 28px rgba(0,165,200,0.06);
      transition:all .15s ease;
    }

    .button:hover{
      filter:brightness(1.08);
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
      gap:18px;
    }

    .card{
      background:var(--card);
      padding:14px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,0.03);
      transition:transform .18s, box-shadow .18s;
      display:flex;
      flex-direction:column;
      align-items:center;
      min-height:240px;
    }

    .card:hover{
      transform:translateY(-6px);
      box-shadow:0 20px 40px rgba(0,0,0,0.6), 0 0 24px rgba(0,245,224,0.06);
    }

    .logo-wrap{
      width:180px;
      height:80px;
      border-radius:8px;
      background:#0d0d0f;
      display:flex;
      align-items:center;
      justify-content:center;
      margin-bottom:12px;
      overflow:hidden;
    }

    .logo-wrap img{
      max-width:100%;
      max-height:100%;
      display:block;
    }

    .title{
      font-weight:700;
      margin-bottom:8px;
      text-align:center;
      word-break:break-word;
    }

    .type{
      font-size:12px;
      color:var(--muted);
      margin-bottom:10px;
      text-align:center;
      word-break:break-word;
    }

    .footer{
      margin-top:auto;
      display:flex;
      gap:8px;
      width:100%;
      justify-content:center;
      flex-wrap:wrap;
    }

    .demo-btn{
      background:#0b0f16;
      color:#fff;
      padding:8px 12px;
      border-radius:12px;
      border:0;
      cursor:pointer;
      box-shadow:0 6px 22px rgba(0,0,0,0.6);
      transition:all .12s ease;
    }

    .demo-btn:hover{
      transform:translateY(-1px);
    }

    .demo-btn.glow{
      box-shadow:0 8px 36px rgba(0,245,224,0.18), 0 0 12px rgba(0,245,224,0.08);
      background:linear-gradient(90deg,#021a16,#003b37);
    }

    .modal{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.6);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
      z-index:9999;
    }

    .modal.hidden{
      display:none;
    }

    .modal-card{
      width:min(560px, 100%);
      background:#111418;
      border:1px solid rgba(255,255,255,0.08);
      border-radius:20px;
      box-shadow:0 20px 60px rgba(0,0,0,0.65);
      padding:22px;
    }

    .modal-header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:18px;
    }

    .modal-title{
      font-size:28px;
      font-weight:700;
      color:#f4f4f4;
      word-break:break-word;
    }

    .modal-close{
      background:transparent;
      border:0;
      color:#a7a7a7;
      font-size:24px;
      cursor:pointer;
      line-height:1;
      padding:4px 8px;
    }

    .modal-close:hover{
      color:#fff;
    }

    .cred-row{
      display:grid;
      grid-template-columns:120px 1fr;
      gap:12px;
      padding:12px 0;
      border-bottom:1px solid rgba(255,255,255,0.06);
      align-items:start;
    }

    .cred-row:last-child{
      border-bottom:0;
    }

    .cred-label{
      color:var(--muted);
      font-size:14px;
    }

    .cred-value{
      color:#fff;
      font-size:15px;
      word-break:break-word;
      white-space:pre-wrap;
    }

    .cred-actions{
      display:flex;
      gap:10px;
      margin-top:18px;
      flex-wrap:wrap;
    }

    .small-btn{
      background:#0c1117;
      border:1px solid rgba(255,255,255,0.08);
      color:#d8d8d8;
      padding:8px 12px;
      border-radius:10px;
      cursor:pointer;
      transition:all .15s ease;
    }

    .small-btn:hover{
      color:#fff;
      border-color:rgba(255,255,255,0.16);
    }

    @media(max-width:900px){
      .sidebar{display:none}
      .main{margin-left:0}
    }

    @media(max-width:640px){
      .cred-row{
        grid-template-columns:1fr;
        gap:6px;
      }

      .modal-title{
        font-size:22px;
      }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <aside class="sidebar">
      <div class="logo-title">Game Demo Showcase</div>
      <div class="search">
        <input id="searchInput" placeholder="搜尋遊戲商或關鍵字..." />
      </div>
      <div id="categories"></div>
      <div style="height:32px"></div>
      <div style="font-size:12px;color:#7f8a8c"></div>
    </aside>

    <main class="main">
      <div class="tools">
        <div style="flex:1">
          <strong id="resultCount">Loading...</strong>
        </div>
        <button class="button" id="refreshBtn">Refresh</button>
      </div>

      <section id="grid" class="grid"></section>
    </main>
  </div>

  <!-- Credential Modal -->
  <div id="credModal" class="modal hidden" aria-hidden="true">
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modalVendorName">
      <div class="modal-header">
        <div class="modal-title" id="modalVendorName">帳密資訊</div>
        <button class="modal-close" id="closeModalBtn" aria-label="關閉">✕</button>
      </div>

      <div class="cred-row">
        <span class="cred-label">需要密碼</span>
        <span class="cred-value" id="modalNeedsPassword">-</span>
      </div>

      <div class="cred-row">
        <span class="cred-label">帳號</span>
        <span class="cred-value" id="modalUsername">-</span>
      </div>

      <div class="cred-row">
        <span class="cred-label">密碼</span>
        <span class="cred-value" id="modalPassword">-</span>
      </div>

      <div class="cred-row">
        <span class="cred-label">備註</span>
        <span class="cred-value" id="modalNote">-</span>
      </div>

      <div class="cred-actions">
        <button class="small-btn" id="copyUsernameBtn" type="button">複製帳號</button>
        <button class="small-btn" id="copyPasswordBtn" type="button">複製密碼</button>
      </div>
    </div>
  </div>

<script>
/* 分类排序 */
const CATEGORY_ORDER = ['All','Slot','Live','Sport','Fishing','Card','Lottery','Cockfight','Esport','Virtual'];

/* 全局状态 */
let ALL_VENDORS = [];
let ACTIVE_CATEGORY = 'All';
let CURRENT_CRED = { username: '', password: '' };

/* 载入 vendors.json */
async function loadVendors(){
  try {
    const res = await fetch('./vendors/vendors.json', { cache: 'no-store' });
    if(!res.ok) throw new Error('vendors.json not found: ' + res.status);

    const data = await res.json();
    return Array.isArray(data) ? data : [];
  } catch (e) {
    console.error('[loadVendors error]', e);
    return [];
  }
}

/* 安全字串 */
function safeText(value, fallback = ''){
  if(value === null || value === undefined) return fallback;
  return String(value).trim();
}

/* 解析帐密资料 */
function parseCredentialInfo(v){
  const rawUsername = safeText(v.username);
  const rawPassword = safeText(v.password);
  const rawNote = safeText(v.passwordNote);

  // 已经有独立栏位就优先用
  if (rawUsername || rawPassword) {
    return {
      username: rawUsername || '未提供',
      password: rawPassword || '未提供',
      note: rawNote || '-'
    };
  }

  if (!rawNote) {
    return {
      username: v.needsPassword ? '未提供' : '不需要',
      password: v.needsPassword ? '未提供' : '不需要',
      note: '-'
    };
  }

  const note = rawNote;

  const patterns = [
    /^(?<username>[^\/\s]+)\/(?<password>.+)$/i,
    /^A:(?<username>[^\/]+)\/P:(?<password>.+)$/i,
    /帳號[:：]?\s*(?<username>\S+)\s*密碼[:：]?\s*(?<password>\S+)/i,
    /帐号[:：]?\s*(?<username>\S+)\s*密码[:：]?\s*(?<password>\S+)/i,
    /用户名[:：]?\s*(?<username>\S+)\s*密码[:：]?\s*(?<password>\S+)/i,
    /username\s*[:：]?\s*(?<username>\S+)\s*password\s*[:：]?\s*(?<password>\S+)/i,
    /user\s*[:：]?\s*(?<username>\S+)\s*password\s*[:：]?\s*(?<password>\S+)/i,
    /account\s*[:：]?\s*(?<username>\S+)\s*\/?\s*password\s*[:：]?\s*(?<password>\S+)/i,
    /login id\s*[:：]?\s*(?<username>\S+)\s*\/\s*password\s*[:：]?\s*(?<password>\S+)/i
  ];

  for (const pattern of patterns) {
    const match = note.match(pattern);
    if (match && match.groups) {
      return {
        username: safeText(match.groups.username, '未提供'),
        password: safeText(match.groups.password, '未提供'),
        note: note
      };
    }
  }

  // 单独一个字串，通常是只有密码
  const isSingleToken =
    !/\s/.test(note) &&
    !/[帳账用密useraccountloginA:P:]/i.test(note) &&
    note.length > 0;

  if (isSingleToken) {
    return {
      username: '未提供',
      password: note,
      note: note
    };
  }

  return {
    username: '未提供',
    password: '未提供',
    note: note
  };
}

/* 分类栏 */
function renderCategories(vendors){
  const cats = Array.from(new Set(
    vendors
      .map(v => safeText(v.type, 'Other'))
      .filter(Boolean)
  )).sort();

  const container = document.getElementById('categories');
  if (!container) return;

  container.innerHTML = '';

  CATEGORY_ORDER.forEach(c => {
    if(c === 'All' || cats.includes(c)){
      const d = document.createElement('div');
      d.className = 'category' + (c === ACTIVE_CATEGORY ? ' active' : '');
      d.textContent = c === 'All' ? '🌐 全部' : c;
      d.onclick = () => {
        ACTIVE_CATEGORY = c;
        document.querySelectorAll('.category').forEach(el => el.classList.remove('active'));
        d.classList.add('active');
        filterAndRender();
      };
      container.appendChild(d);
    }
  });
}

/* 开启 modal */
function openCredModal(v){
  const modal = document.getElementById('credModal');
  if (!modal) return;

  const parsed = parseCredentialInfo(v);

  CURRENT_CRED.username = parsed.username;
  CURRENT_CRED.password = parsed.password;

  const vendorNameEl = document.getElementById('modalVendorName');
  const needsPasswordEl = document.getElementById('modalNeedsPassword');
  const usernameEl = document.getElementById('modalUsername');
  const passwordEl = document.getElementById('modalPassword');
  const noteEl = document.getElementById('modalNote');

  if (vendorNameEl) vendorNameEl.textContent = `${safeText(v.name, 'Vendor')} 顯示`;
  if (needsPasswordEl) needsPasswordEl.textContent = v.needsPassword ? '需要' : '不需要';
  if (usernameEl) usernameEl.textContent = v.needsPassword ? parsed.username : '不需要';
  if (passwordEl) passwordEl.textContent = v.needsPassword ? parsed.password : '不需要';
  if (noteEl) noteEl.textContent = parsed.note || '-';

  modal.classList.remove('hidden');
  modal.setAttribute('aria-hidden', 'false');
}

/* 关闭 modal */
function closeCredModal(){
  const modal = document.getElementById('credModal');
  if (!modal) return;

  modal.classList.add('hidden');
  modal.setAttribute('aria-hidden', 'true');
}

/* 复制文字 */
async function copyText(text){
  const value = safeText(text);
  if (!value || value === '未提供' || value === '不需要') {
    alert('沒有可複製的內容');
    return;
  }

  try {
    await navigator.clipboard.writeText(value);
    alert('已複製');
  } catch (e) {
    console.error('[copy error]', e);
    alert('複製失敗，請手動複製');
  }
}

/* 卡片生成 */
function makeCard(v){
  const div = document.createElement('div');
  div.className = 'card';

  const logo = document.createElement('div');
  logo.className = 'logo-wrap';

  const img = document.createElement('img');
  img.alt = safeText(v.name, 'Vendor');
  img.src = safeText(v.logo, 'logos/placeholder.jpg');

  img.onerror = function(){
    const safeName = safeText(v.name, 'Vendor')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');

    const svg = `
      <svg xmlns="http://www.w3.org/2000/svg" width="320" height="160">
        <rect width="100%" height="100%" fill="#0d0d0f"/>
        <text x="50%" y="50%" fill="#666" font-size="14"
          text-anchor="middle" alignment-baseline="middle">${safeName}</text>
      </svg>`;
    this.src = 'data:image/svg+xml;utf8,' + encodeURIComponent(svg);
  };
  logo.appendChild(img);

  const title = document.createElement('div');
  title.className = 'title';
  title.textContent = safeText(v.name, 'Unnamed Vendor');

  const type = document.createElement('div');
  type.className = 'type';
  type.textContent = safeText(v.type, 'Other');

  const footer = document.createElement('div');
  footer.className = 'footer';

  /* Open Demo 按钮 */
  const btnDemo = document.createElement('button');
  btnDemo.className = 'demo-btn glow';
  btnDemo.textContent = 'Open Demo';
  btnDemo.onclick = () => {
    const url = safeText(v.openDemo || v.demoUrl);
    if(url){
      window.open(url, '_blank');
    } else {
      alert('Demo URL 未設定');
    }
  };

  /* Show Cred 按钮 */
  const btnCred = document.createElement('button');
  btnCred.className = 'demo-btn';
  btnCred.textContent = 'Show Cred';
  btnCred.onclick = () => {
    openCredModal(v);
  };

  footer.appendChild(btnDemo);
  footer.appendChild(btnCred);

  div.appendChild(logo);
  div.appendChild(title);
  div.appendChild(type);
  div.appendChild(footer);

  return div;
}

/* 渲染 grid */
function renderGrid(list){
  const grid = document.getElementById('grid');
  const resultCount = document.getElementById('resultCount');

  if (!grid || !resultCount) return;

  grid.innerHTML = '';

  if (!Array.isArray(list) || list.length === 0) {
    const empty = document.createElement('div');
    empty.style.color = 'var(--muted)';
    empty.style.padding = '16px 0';
    empty.textContent = '沒有符合的廠商';
    grid.appendChild(empty);
    resultCount.textContent = '显示 0 个厂商';
    return;
  }

  list.forEach(v => {
    try {
      grid.appendChild(makeCard(v));
    } catch (e) {
      console.error('[render card error]', v, e);
    }
  });

  resultCount.textContent = `显示 ${list.length} 个厂商`;
}

/* 搜寻 + 分类 */
function filterAndRender(){
  const searchInput = document.getElementById('searchInput');
  const keyword = safeText(searchInput ? searchInput.value : '').toLowerCase();

  let list = ALL_VENDORS.slice();

  if (ACTIVE_CATEGORY !== 'All') {
    list = list.filter(v => safeText(v.type) === ACTIVE_CATEGORY);
  }

  if (keyword) {
    list = list.filter(v => {
      const name = safeText(v.name).toLowerCase();
      const type = safeText(v.type).toLowerCase();
      const note = safeText(v.passwordNote).toLowerCase();
      return name.includes(keyword) || type.includes(keyword) || note.includes(keyword);
    });
  }

  renderGrid(list);
}

/* 初始化 */
async function init(){
  const vendors = await loadVendors();

  ALL_VENDORS = vendors.map(v => {
    return {
      ...v,
      name: safeText(v.name, 'Unnamed Vendor'),
      type: safeText(v.type, 'Other'),
      logo: safeText(v.logo, 'logos/placeholder.jpg'),
      openDemo: safeText(v.openDemo),
      demoUrl: safeText(v.demoUrl),
      passwordNote: safeText(v.passwordNote),
      needsPassword: Boolean(v.needsPassword)
    };
  });

  renderCategories(ALL_VENDORS);
  filterAndRender();
}

/* 事件绑定 */
(function bindEvents(){
  const searchInput = document.getElementById('searchInput');
  const refreshBtn = document.getElementById('refreshBtn');
  const closeModalBtn = document.getElementById('closeModalBtn');
  const credModal = document.getElementById('credModal');
  const copyUsernameBtn = document.getElementById('copyUsernameBtn');
  const copyPasswordBtn = document.getElementById('copyPasswordBtn');

  if (searchInput) {
    searchInput.addEventListener('input', filterAndRender);
  }

  if (refreshBtn) {
    refreshBtn.addEventListener('click', init);
  }

  if (closeModalBtn) {
    closeModalBtn.addEventListener('click', closeCredModal);
  }

  if (credModal) {
    credModal.addEventListener('click', (e) => {
      if (e.target === credModal) {
        closeCredModal();
      }
    });
  }

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      closeCredModal();
    }
  });

  if (copyUsernameBtn) {
    copyUsernameBtn.addEventListener('click', () => copyText(CURRENT_CRED.username));
  }

  if (copyPasswordBtn) {
    copyPasswordBtn.addEventListener('click', () => copyText(CURRENT_CRED.password));
  }
})();

/* 启动 */
init();
</script>
</body>
</html>
